<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Feedback Workshop Registration</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&family=DM+Serif+Display&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'DM Sans','Helvetica Neue',Arial,sans-serif;background:#FAFAF8;color:#1a1a1a;min-height:100vh}
    @keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
    @keyframes spin{to{transform:rotate(360deg)}}
    @keyframes fadeIn{from{opacity:0}to{opacity:1}}
    .fade-up{animation:fadeUp .5s ease both}.fade-up-d1{animation:fadeUp .5s ease .15s both}.fade-up-d2{animation:fadeUp .5s ease .3s both}

    /* Loading */
    .loading-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;flex-direction:column;gap:16px}
    .spinner{width:36px;height:36px;border:3px solid #E0E0E0;border-top-color:#1a1a1a;border-radius:50%;animation:spin .8s linear infinite}

    /* Landing */
    .landing{max-width:800px;margin:0 auto;padding:80px 24px;text-align:center}
    .landing-badge{display:inline-block;background:#1a1a1a;color:#fff;padding:6px 16px;border-radius:20px;font-size:11px;font-weight:600;letter-spacing:1.2px;text-transform:uppercase;margin-bottom:24px}
    .landing h1{font-family:'DM Serif Display',Georgia,serif;font-size:48px;font-weight:400;line-height:1.15;margin-bottom:16px}
    .landing .sub{font-size:17px;color:#666;max-width:520px;margin:0 auto 48px;line-height:1.6}
    .features{margin-top:72px;display:grid;grid-template-columns:repeat(3,1fr);gap:20px}
    .feat{background:#fff;padding:28px;border-radius:14px;border:1px solid #ECECEC;text-align:center}
    .feat .ic{font-size:28px;margin-bottom:12px}.feat h3{font-size:14px;font-weight:700;margin-bottom:6px}.feat p{font-size:13px;color:#888;line-height:1.5}

    /* Buttons */
    .btn-row{display:flex;gap:16px;justify-content:center;flex-wrap:wrap}
    .btn{padding:14px 32px;border-radius:12px;font-size:15px;font-weight:600;cursor:pointer;border:none;transition:transform .15s;font-family:inherit}
    .btn:hover{transform:translateY(-2px)}
    .btn-pri{background:#1a1a1a;color:#fff;box-shadow:0 2px 12px rgba(0,0,0,.12)}.btn-sec{background:#fff;color:#1a1a1a;border:1.5px solid #E0E0E0}
    .btn-sm{padding:8px 16px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;border:none}
    .btn-block{width:100%;padding:14px;background:#1a1a1a;color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer;font-family:inherit;margin-top:4px}
    .btn-block:disabled{background:#ccc;cursor:default}
    .btn-danger{background:#FFF5F5;color:#C62828;border:1px solid #FFCDD2}

    /* Header */
    .header{background:#fff;border-bottom:1px solid #ECECEC;padding:14px 24px;position:sticky;top:0;z-index:100}
    .header-inner{max-width:1100px;margin:0 auto;display:flex;justify-content:space-between;align-items:center}
    .header-left{display:flex;align-items:center;gap:16px}.header-right{display:flex;align-items:center;gap:10px}
    .header h1{font-family:'DM Serif Display',Georgia,serif;font-size:18px;font-weight:400}
    .back-btn{background:none;border:none;cursor:pointer;font-size:13px;color:#888;font-family:inherit;padding:0}

    .admin-hdr{background:#1a1a1a;color:#fff;padding:14px 24px}
    .admin-hdr h1{color:#fff}.admin-hdr .back-btn{color:#aaa}
    .admin-tab{padding:6px 14px;border-radius:8px;border:none;font-size:13px;font-weight:600;cursor:pointer;background:transparent;color:#aaa;text-transform:capitalize;font-family:inherit}
    .admin-tab.active{background:#fff;color:#1a1a1a}

    .content{max-width:1100px;margin:0 auto;padding:24px}

    /* Filters */
    .filters{display:flex;gap:12px;margin-bottom:20px;flex-wrap:wrap;align-items:center}
    .f-input,.f-select{padding:10px 14px;border:1.5px solid #E0E0E0;border-radius:10px;font-size:13px;outline:none;font-family:inherit;background:#fff}
    .f-input{flex:1 1 200px;min-width:200px}.f-select{cursor:pointer}
    .count{font-size:13px;color:#888;margin-bottom:16px}

    /* Cards */
    .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:16px}
    .card{background:#fff;border-radius:14px;border:1px solid #ECECEC;padding:24px;cursor:pointer;transition:box-shadow .2s,transform .15s}
    .card:hover{box-shadow:0 4px 20px rgba(0,0,0,.08);transform:translateY(-2px)}
    .card-top{display:flex;justify-content:space-between;align-items:start;margin-bottom:12px}
    .card h3{font-size:16px;font-weight:700;margin-bottom:8px}.card .desc{font-size:13px;color:#888;line-height:1.5;margin-bottom:16px}
    .card-bot{display:flex;justify-content:space-between;align-items:center}
    .card-dt{font-size:13px;color:#555}.card-dt strong{font-weight:600}
    .card-spots{font-size:12px;font-weight:600}.open{color:#2E7D32}.full{color:#C62828}
    .cap-bar{margin-top:12px;height:4px;border-radius:2px;background:#f0f0f0;overflow:hidden}
    .cap-fill{height:100%;border-radius:2px;transition:width .3s}

    /* Badges */
    .badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;letter-spacing:.3px;white-space:nowrap}
    .b-netflix{background:#FFEBEE;color:#B71C1C;border:1px solid #EF9A9A}
    .b-anim{background:#E8F5E9;color:#1B5E20;border:1px solid #81C784}
    .b-eye{background:#E3F2FD;color:#0D47A1;border:1px solid #64B5F6}
    .b-open{background:#E8F5E9;color:#2E7D32}.b-almost{background:#FFF3E0;color:#E65100}.b-full{background:#FFEBEE;color:#C62828}
    .b-conf{background:#E8F5E9;color:#2E7D32}.b-wait{background:#FFF3E0;color:#E65100}
    .entity-tag{display:inline-block;padding:2px 8px;border-radius:8px;font-size:10px;font-weight:700;letter-spacing:.3px;text-transform:uppercase;background:#FFF3E0;color:#E65100;margin-left:6px}

    /* Modal */
    .overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center;z-index:200;padding:24px;animation:fadeIn .2s ease}
    .modal{background:#fff;border-radius:16px;padding:32px;width:100%;max-width:500px;max-height:90vh;overflow:auto;animation:fadeUp .3s ease}
    .modal-hdr{display:flex;justify-content:space-between;align-items:start;margin-bottom:16px}
    .modal-close{background:none;border:none;font-size:22px;cursor:pointer;color:#888;padding:0;line-height:1}
    .modal h2{font-size:22px;font-weight:700;margin-bottom:8px}
    .modal .mdesc{font-size:14px;color:#666;line-height:1.5;margin-bottom:16px}
    .sess-det{background:#FAFAF8;border-radius:10px;padding:16px;margin-bottom:24px;font-size:14px;color:#555;display:grid;grid-template-columns:1fr 1fr;gap:8px}
    .form-input,.form-select{width:100%;padding:12px 16px;border:1.5px solid #E0E0E0;border-radius:10px;font-size:14px;outline:none;font-family:inherit;background:#fff}
    .form-select{cursor:pointer}.form-textarea{resize:vertical;min-height:80px}
    .fg{margin-bottom:12px}
    .form-label{display:block;font-size:12px;font-weight:600;color:#666;margin-bottom:4px}
    .form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    .err-msg{color:#C62828;font-size:13px;background:#FFF5F5;padding:8px 12px;border-radius:8px;margin-bottom:12px}

    .success-box{border-radius:10px;padding:24px;text-align:center}
    .success-box.confirmed{background:#E8F5E9}.success-box.waitlisted{background:#FFF3E0}
    .success-box .sicon{font-size:40px;margin-bottom:8px}
    .success-box h3{margin-bottom:8px}.success-box.confirmed h3{color:#2E7D32}.success-box.waitlisted h3{color:#E65100}
    .success-box p{font-size:14px;color:#555;margin-bottom:16px}

    /* Admin */
    .stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:32px}
    .stat{background:#fff;border-radius:14px;padding:24px;border:1px solid #ECECEC}
    .stat-label{font-size:11px;color:#888;text-transform:uppercase;letter-spacing:.5px;font-weight:600;margin-bottom:4px}
    .stat-val{font-size:32px;font-weight:700}
    .bar-chart{background:#fff;border-radius:14px;border:1px solid #ECECEC;padding:24px;margin-bottom:24px}
    .bar-row{display:flex;align-items:center;gap:12px;margin-bottom:12px}
    .bar-lbl{font-size:13px;font-weight:600;width:160px;flex-shrink:0}
    .bar-trk{flex:1;height:24px;border-radius:6px;background:#f5f5f5;overflow:hidden}
    .bar-fl{height:100%;border-radius:6px;background:#1a1a1a;display:flex;align-items:center;justify-content:flex-end;padding-right:8px;transition:width .5s}
    .bar-fl span{font-size:11px;font-weight:700;color:#fff}
    .fill-list{background:#fff;border-radius:14px;border:1px solid #ECECEC;overflow:hidden}
    .fill-row{display:flex;align-items:center;padding:14px 20px;border-bottom:1px solid #f5f5f5;gap:16px}
    .fill-nm{font-size:13px;font-weight:600;flex:1 1 200px;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .fill-bar{flex:0 0 200px;height:8px;border-radius:4px;background:#f0f0f0;overflow:hidden}
    .fill-inner{height:100%;border-radius:4px}
    .fill-ct{font-size:12px;color:#888;flex:0 0 120px;text-align:right}
    .tbl-wrap{background:#fff;border-radius:14px;border:1px solid #ECECEC;overflow:auto}
    table{width:100%;border-collapse:collapse;font-size:13px}
    th{padding:12px 16px;text-align:left;font-weight:700;border-bottom:1px solid #ECECEC;font-size:11px;text-transform:uppercase;letter-spacing:.3px;color:#666;background:#FAFAF8}
    td{padding:12px 16px;border-bottom:1px solid #f5f5f5}
    .trunc{max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .sli{background:#fff;border-radius:12px;padding:20px;border:1px solid #ECECEC;display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
    .sli-info h3{font-size:15px;font-weight:700;margin:8px 0 4px}.sli-info p{font-size:13px;color:#888}
    .sli-acts{display:flex;gap:8px;flex-shrink:0}
    .settings-panel{background:#fff;border-radius:14px;border:1px solid #ECECEC;padding:28px;max-width:600px}
    .sg{margin-bottom:24px}.sg label{font-size:13px;font-weight:700;margin-bottom:6px;display:block}.sg .hint{font-size:12px;color:#888;margin-top:4px}
    .my-reg{background:#fff;border-radius:12px;padding:20px;border:1px solid #ECECEC;display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
    .my-reg h3{font-size:15px;font-weight:700;margin-bottom:4px;display:flex;align-items:center;gap:10px}.my-reg p{font-size:13px;color:#888}
    .empty{background:#fff;border-radius:12px;padding:40px;text-align:center;border:1px solid #ECECEC;color:#888}
    .sec-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
    .sec-hdr h2{font-size:20px;font-weight:700}
    .admin-login{min-height:100vh;display:flex;align-items:center;justify-content:center}
    .admin-login .box{background:#fff;border-radius:16px;padding:40px;width:400px;box-shadow:0 4px 24px rgba(0,0,0,.06)}
    @media(max-width:768px){.landing h1{font-size:32px}.features{grid-template-columns:1fr}.stats-grid{grid-template-columns:repeat(2,1fr)}.grid{grid-template-columns:1fr}.form-row{grid-template-columns:1fr}.fill-bar{flex:0 0 100px}}
  </style>
</head>
<body>
<div id="app"><div class="loading-screen"><div class="spinner"></div><p style="color:#666;font-size:14px">Loading Feedback Workshop Portal...</p></div></div>

<script>
// === STATE ===
var S = {
  view: "loading", sessions: [], registrations: [], settings: {},
  isAdmin: false, filterCat: "All", filterDate: "All", filterAvail: "All",
  search: "", selSession: null, regForm: { name: "", email: "", entity: "", manager: "" },
  regStatus: null, regMsg: "", myEmail: "", showMyRegs: false, adminTab: "dashboard",
  editSession: null, isNew: false, processing: false
};

// === API ===
function api(method, url, body) {
  var opts = { method: method, headers: { "Content-Type": "application/json" } };
  if (body) opts.body = JSON.stringify(body);
  return fetch(url, opts).then(function(r) { return r.json(); });
}

function loadAll(cb) {
  api("GET", "/api/data").then(function(d) {
    S.sessions = d.sessions || []; S.registrations = d.registrations || []; S.settings = d.settings || {};
    if (cb) cb(); render();
  }).catch(function() { S.view = "landing"; render(); });
}

// === INIT ===
loadAll(function() { S.view = "landing"; });

// === HELPERS ===
function esc(t) { var d = document.createElement("div"); d.textContent = t || ""; return d.innerHTML; }
function fmtDate(ds) { if(!ds)return""; var d=new Date(ds+"T12:00:00"),days=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"],mos=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"]; return days[d.getDay()]+", "+mos[d.getMonth()]+" "+d.getDate()+", "+d.getFullYear(); }
function catClass(c) { return c.includes("Animation")?"b-anim":c.includes("Eyeline")?"b-eye":"b-netflix"; }
function gcalUrl(s) {
  // Build Google Calendar add-event URL
  var dp=s.date.split("-"),t=s.time.trim();
  var m12=t.match(/^(\d{1,2})(?::(\d{2}))?\s*(AM|PM|am|pm|a|p)\.?m?\.?$/i);
  var m24=t.match(/^(\d{1,2}):(\d{2})$/);
  var h=0,mi=0;
  if(m12){h=parseInt(m12[1]);mi=parseInt(m12[2]||"0");var pm=m12[3].toLowerCase().indexOf("p")===0;if(pm&&h!==12)h+=12;if(!pm&&h===12)h=0;}
  else if(m24){h=parseInt(m24[1]);mi=parseInt(m24[2]);}
  var endMin=h*60+mi+(s.duration||90);var eh=Math.floor(endMin/60);var em=endMin%60;
  var start=dp[0]+dp[1]+dp[2]+"T"+String(h).padStart(2,"0")+String(mi).padStart(2,"0")+"00";
  var end=dp[0]+dp[1]+dp[2]+"T"+String(eh).padStart(2,"0")+String(em).padStart(2,"0")+"00";
  var details=encodeURIComponent((s.description||"")+"\n\nFeedback Workshop · UCAN · Pacific Time"+(s.meetingLink?"\n\nJoin: "+s.meetingLink:"")+(s.location?"\nLocation: "+s.location:""));
  var loc=encodeURIComponent(s.meetingLink||s.location||"Virtual");
  return "https://calendar.google.com/calendar/render?action=TEMPLATE"+
    "&text="+encodeURIComponent(s.title)+
    "&dates="+start+"/"+end+
    "&ctz=America/Los_Angeles"+
    "&details="+details+
    "&location="+loc;
}
function confCount(sid) { return S.registrations.filter(function(r){return r.sessionId===sid&&r.status==="Confirmed"}).length; }
function waitCount(sid) { return S.registrations.filter(function(r){return r.sessionId===sid&&r.status==="Waitlisted"}).length; }
function extConfCount(sid) { return S.registrations.filter(function(r){return r.sessionId===sid&&r.status==="Confirmed"&&r.entity!=="Netflix"}).length; }
function sessStatus(s) { var c=confCount(s.id); return c>=s.capacity?"full":c>=s.capacity*.8?"almost":"open"; }
function statusLabel(st) { return st==="full"?"Full — Waitlist":st==="almost"?"Almost Full":"Open"; }
function uniqDates() { var d={}; S.sessions.forEach(function(s){d[s.date]=1}); return Object.keys(d).sort(); }
function uniqCats() { var c={}; S.sessions.forEach(function(s){c[s.category]=1}); return Object.keys(c).sort(); }
function filtered() {
  return S.sessions.slice().sort(function(a,b){return a.date.localeCompare(b.date)||((a.time||"").localeCompare(b.time||""))}).filter(function(s){
    if(S.filterCat!=="All"&&s.category!==S.filterCat)return false;
    if(S.filterDate!=="All"&&s.date!==S.filterDate)return false;
    if(S.filterAvail!=="All"){var st=sessStatus(s);if(S.filterAvail==="open"&&st==="full")return false;if(S.filterAvail==="full"&&st!=="full")return false;}
    if(S.search){var q=S.search.toLowerCase();if(s.title.toLowerCase().indexOf(q)===-1&&(s.description||"").toLowerCase().indexOf(q)===-1)return false;}
    return true;
  });
}
function myRegs() { if(!S.myEmail)return[]; var e=S.myEmail.toLowerCase(); return S.registrations.filter(function(r){return r.email.toLowerCase()===e}); }
function findSess(id) { return S.sessions.find(function(s){return s.id===id}); }

// === ACTIONS ===
function doRegister() {
  if(S.processing)return;
  var f=S.regForm;
  if(!f.name||!f.email||!f.entity||!f.manager){S.regStatus="error";S.regMsg="Please fill in all fields.";render();return;}
  if(!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(f.email)){S.regStatus="error";S.regMsg="Please enter a valid email address.";render();return;}
  S.processing=true;render();
  api("POST","/api/register",{sessionId:S.selSession.id,name:f.name,email:f.email,entity:f.entity,manager:f.manager}).then(function(r){
    S.processing=false;
    if(r.success){S.regStatus=r.status==="Confirmed"?"success":"waitlisted";S.regMsg=r.message;loadAll();}
    else{S.regStatus="error";S.regMsg=r.message;render();}
  }).catch(function(){S.processing=false;S.regStatus="error";S.regMsg="Something went wrong.";render();});
}

function doCancel(id) {
  if(S.processing||!confirm("Cancel this registration?"))return;
  S.processing=true;render();
  api("POST","/api/cancel",{regId:id}).then(function(){S.processing=false;loadAll();}).catch(function(){S.processing=false;render();});
}

function doAdminLogin() {
  var code = document.getElementById("admin-code").value;
  api("POST","/api/admin/login",{code:code}).then(function(r){
    if(r.success){S.isAdmin=true;S.view="admin";S.adminTab="dashboard";render();}
    else{document.getElementById("admin-err").textContent="Invalid admin code.";}
  });
}

function doSaveSession() {
  if(S.processing)return;S.processing=true;render();
  var d=S.editSession;
  var url=S.isNew?"/api/admin/sessions":"/api/admin/sessions/"+d.id;
  var method=S.isNew?"POST":"PUT";
  api(method,url,d).then(function(){S.processing=false;S.editSession=null;S.isNew=false;loadAll();}).catch(function(){S.processing=false;alert("Error saving.");render();});
}

function doDeleteSession(id) {
  if(!confirm("Delete this session?"))return;
  api("DELETE","/api/admin/sessions/"+id).then(function(){loadAll();});
}

function doSaveSettings() {
  var ns={
    maxSessionsPerPerson:parseInt(document.getElementById("set-max").value)||5,
    adminCode:document.getElementById("set-code").value,
    entities:document.getElementById("set-ent").value.split(",").map(function(e){return e.trim()}).filter(Boolean),
    categories:document.getElementById("set-cat").value.split(",").map(function(e){return e.trim()}).filter(Boolean),
    calendarId:(document.getElementById("set-calid")?document.getElementById("set-calid").value:"")
  };
  api("PUT","/api/admin/settings",ns).then(function(){loadAll(function(){alert("Settings saved!")});});
}

function doExport() { window.open("/api/admin/export","_blank"); }

// === RENDER ===
function render() {
  var app=document.getElementById("app"), h="";
  switch(S.view){
    case "loading": h='<div class="loading-screen"><div class="spinner"></div><p style="color:#666;font-size:14px">Loading...</p></div>';break;
    case "landing": h=rLanding();break;
    case "catalog": h=S.showMyRegs?rMyRegs():rCatalog();break;
    case "admin-login": h=rAdminLogin();break;
    case "admin": h=rAdmin();break;
  }
  if(S.selSession) h+=rRegModal();
  if(S.editSession) h+=rEditModal();
  app.innerHTML=h;
}

function rLanding(){
  return '<div class="landing"><div class="fade-up"><div class="landing-badge">Feedback Workshops · UCAN</div>'+
    '<h1>Feedback Workshop Registration</h1>'+
    '<p class="sub">Browse and register for upcoming feedback workshop sessions. Open to all Netflix Animation Studio, and Eyeline team members. All sessions are virtual and in Pacific Time.</p></div>'+
    '<div class="btn-row fade-up-d1"><button class="btn btn-pri" onclick="S.view=\'catalog\';S.showMyRegs=false;render()">Browse & Register →</button>'+
    '<button class="btn btn-sec" onclick="S.view=\'admin-login\';render()">Admin Portal</button></div>'+
    '<div class="features fade-up-d2">'+
    '<div class="feat"><div class="ic">📅</div><h3>'+S.sessions.length+' Sessions</h3><p>Multiple dates and time slots in Pacific Time</p></div>'+
    '<div class="feat"><div class="ic">💻</div><h3>100% Virtual</h3><p>Join from anywhere in the U.S. and Canada</p></div>'+
    '<div class="feat"><div class="ic">⚡</div><h3>Instant Confirmation</h3><p>Register and see your status immediately</p></div></div></div>';
}

function rAdminLogin(){
  return '<div class="admin-login"><div class="box">'+
    '<button class="back-btn" onclick="S.view=\'landing\';render()">← Back</button>'+
    '<h2 style="margin:16px 0 8px;font-size:22px;font-weight:700">Admin Access</h2>'+
    '<p style="margin-bottom:24px;font-size:14px;color:#666">Enter the admin code to manage sessions and registrations.</p>'+
    '<input class="form-input" type="password" id="admin-code" placeholder="Admin code" onkeydown="if(event.key===\'Enter\')doAdminLogin()" style="margin-bottom:12px">'+
    '<p id="admin-err" style="color:#C62828;font-size:13px;margin-bottom:12px"></p>'+
    '<button class="btn-block" onclick="doAdminLogin()">Enter Admin Portal</button></div></div>';
}

function rCatalog(){
  var dates=uniqDates(),cats=uniqCats(),fs=filtered(),max=S.settings.maxSessionsPerPerson||5;
  var h='<div class="header"><div class="header-inner"><div class="header-left">'+
    '<button class="back-btn" onclick="S.view=\'landing\';render()">← Home</button><h1>Session Catalog</h1></div>'+
    '<div class="header-right"><input class="f-input" style="width:220px;padding:8px 14px;font-size:13px" placeholder="Your email to view registrations" id="myEm" value="'+esc(S.myEmail)+'" onchange="S.myEmail=this.value">'+
    '<button class="btn-sm" style="background:'+(S.myEmail?'#1a1a1a':'#ccc')+';color:#fff" onclick="S.myEmail=document.getElementById(\'myEm\').value;if(S.myEmail){S.showMyRegs=true;render();}">My Registrations</button>'+
    '</div></div></div><div class="content fade-up">';

  h+='<div class="filters"><input class="f-input" placeholder="Search sessions..." value="'+esc(S.search)+'" oninput="S.search=this.value;render()">'+
    '<select class="f-select" onchange="S.filterCat=this.value;render()"><option value="All">All Categories</option>';
  cats.forEach(function(c){h+='<option value="'+esc(c)+'"'+(S.filterCat===c?' selected':'')+'>'+esc(c)+'</option>'});
  h+='</select><select class="f-select" onchange="S.filterDate=this.value;render()"><option value="All">All Dates</option>';
  dates.forEach(function(d){h+='<option value="'+esc(d)+'"'+(S.filterDate===d?' selected':'')+'>'+fmtDate(d)+'</option>'});
  h+='</select><select class="f-select" onchange="S.filterAvail=this.value;render()"><option value="All">All Availability</option>'+
    '<option value="open"'+(S.filterAvail==="open"?' selected':'')+'>Open Spots</option>'+
    '<option value="full"'+(S.filterAvail==="full"?' selected':'')+'>Full / Waitlist</option></select></div>';

  h+='<p class="count">'+fs.length+' session'+(fs.length!==1?'s':'')+' available · Max '+max+' registrations per person</p><div class="grid">';
  fs.forEach(function(s){
    var st=sessStatus(s),c=confCount(s.id),w=waitCount(s.id),left=Math.max(0,s.capacity-c),pct=Math.min(100,Math.round(c/s.capacity*100));
    h+='<div class="card" onclick="S.selSession=findSess(\''+s.id+'\');S.regStatus=null;S.regMsg=\'\';render()">'+
      '<div class="card-top"><span class="badge '+catClass(s.category)+'">'+esc(s.category)+'</span><span class="badge b-'+st+'">'+statusLabel(st)+'</span></div>'+
      '<h3>'+esc(s.title)+'</h3>'+(s.restrictedToEntity?'<span class="entity-tag">🔒 '+esc(s.restrictedToEntity)+' Only</span>':'')+
      '<p class="desc">'+esc(s.description)+'</p>'+
      '<div class="card-bot"><div class="card-dt"><strong>'+fmtDate(s.date)+'</strong> · '+esc(s.time)+' PT · '+s.duration+'m</div>'+
      '<div class="card-spots '+(st==="full"?"full":"open")+'">'+(st==="full"?w+' waitlisted':left+' spot'+(left!==1?'s':'')+' left')+'</div></div>'+
      '<div class="cap-bar"><div class="cap-fill" style="width:'+pct+'%;background:'+(st==="full"?"#C62828":st==="almost"?"#E65100":"#2E7D32")+'"></div></div></div>';
  });
  h+='</div></div>';
  return h;
}

function rRegModal(){
  var s=S.selSession;if(!s)return"";
  var st=sessStatus(s),c=confCount(s.id),ents=S.settings.entities||["Netflix","Netflix Animation Studio","Eyeline"];
  var h='<div class="overlay" onclick="if(event.target===this){S.selSession=null;S.regStatus=null;render()}"><div class="modal">'+
    '<div class="modal-hdr"><span class="badge '+catClass(s.category)+'">'+esc(s.category)+'</span><button class="modal-close" onclick="S.selSession=null;S.regStatus=null;render()">×</button></div>'+
    '<h2>'+esc(s.title)+'</h2><p class="mdesc">'+esc(s.description)+'</p>'+
    (s.restrictedToEntity?'<p style="font-size:13px;color:#E65100;margin-bottom:12px;font-weight:600">🔒 Restricted to '+esc(s.restrictedToEntity)+' participants</p>':'')+
    (s.externalEntityCap>0&&!s.restrictedToEntity?'<p style="font-size:13px;color:#555;margin-bottom:12px">External entity spots: '+extConfCount(s.id)+'/'+s.externalEntityCap+' filled</p>':'')+
    '<div class="sess-det"><div><strong>Date:</strong> '+fmtDate(s.date)+'</div><div><strong>Time:</strong> '+esc(s.time)+' PT</div>'+
    '<div><strong>Duration:</strong> '+s.duration+' min</div><div><strong>Capacity:</strong> '+c+'/'+s.capacity+'</div>'+
    '<div><strong>Format:</strong> Virtual</div><div><strong>Region:</strong> UCAN</div>'+
    (s.location?'<div style="grid-column:1/-1"><strong>Location:</strong> '+esc(s.location)+'</div>':'')+
    (s.meetingLink?'<div style="grid-column:1/-1"><strong>Meeting Link:</strong> <a href="'+esc(s.meetingLink)+'" target="_blank" style="color:#0D47A1;word-break:break-all">'+esc(s.meetingLink)+'</a></div>':'')+'</div>';

  if(S.regStatus==="success"||S.regStatus==="waitlisted"){
    h+='<div class="success-box '+(S.regStatus==="success"?"confirmed":"waitlisted")+'">'+
      '<div class="sicon">'+(S.regStatus==="success"?"✅":"⏳")+'</div>'+
      '<h3>'+(S.regStatus==="success"?"You\'re Registered!":"You\'re on the Waitlist")+'</h3>'+
      '<p>'+esc(S.regMsg)+'</p>'+
      (S.regStatus==="success"?'<a href="'+gcalUrl(s)+'" target="_blank" class="btn-sm" style="display:inline-block;background:#2E7D32;color:#fff;padding:10px 24px;text-decoration:none;border-radius:8px;margin-right:8px;margin-bottom:8px">📅 Add to Google Calendar</a>':'')+
      '<button class="btn-sm" style="background:#1a1a1a;color:#fff;padding:10px 24px" onclick="S.selSession=null;S.regStatus=null;render()">Done</button></div>';
  } else {
    h+='<h3 style="font-size:15px;font-weight:700;margin-bottom:16px">Register for this session</h3>';
    if(S.regStatus==="error") h+='<div class="err-msg">'+esc(S.regMsg)+'</div>';
    h+='<div class="fg"><input class="form-input" placeholder="Full Name *" value="'+esc(S.regForm.name)+'" oninput="S.regForm.name=this.value"></div>'+
      '<div class="fg"><input class="form-input" type="email" placeholder="Email Address *" value="'+esc(S.regForm.email)+'" oninput="S.regForm.email=this.value"></div>'+
      '<div class="fg"><select class="form-select" onchange="S.regForm.entity=this.value"><option value="" disabled '+(S.regForm.entity?'':'selected')+'>Select Entity *</option>';
    ents.forEach(function(e){h+='<option value="'+esc(e)+'"'+(S.regForm.entity===e?' selected':'')+'>'+esc(e)+'</option>'});
    h+='</select></div><div class="fg"><input class="form-input" placeholder="Manager Name *" value="'+esc(S.regForm.manager)+'" oninput="S.regForm.manager=this.value"></div>'+
      '<button class="btn-block" onclick="doRegister()" '+(S.processing?'disabled':'')+'>'+(S.processing?'Registering...':(st==="full"?"Join Waitlist":"Register Now"))+'</button>';
  }
  h+='</div></div>';
  return h;
}

function rMyRegs(){
  var regs=myRegs(),max=S.settings.maxSessionsPerPerson||5;
  var h='<div class="header"><div class="header-inner"><div class="header-left">'+
    '<button class="back-btn" onclick="S.showMyRegs=false;render()">← Back to Catalog</button><h1>My Registrations</h1></div></div></div>'+
    '<div class="content fade-up"><p style="color:#666;margin-bottom:24px;font-size:14px">Showing registrations for '+esc(S.myEmail)+' · '+regs.length+' of '+max+' max sessions used</p>';
  if(!regs.length){h+='<div class="empty"><p>No registrations found for this email.</p></div>';}
  else{regs.forEach(function(r){
    var s=findSess(r.sessionId);
    h+='<div class="my-reg"><div><h3>'+esc(r.sessionTitle)+' <span class="badge '+(r.status==="Confirmed"?"b-conf":"b-wait")+'">'+(r.status==="Confirmed"?"✓ Confirmed":"⏳ Waitlisted")+'</span></h3>'+
      (s?'<p>'+fmtDate(s.date)+' at '+esc(s.time)+' PT · '+s.duration+' min · Virtual</p>':'')+
      (s&&s.meetingLink&&r.status==="Confirmed"?'<p style="margin-top:4px"><a href="'+esc(s.meetingLink)+'" target="_blank" style="color:#0D47A1;font-size:13px;font-weight:600">🔗 Join Meeting</a></p>':'')+
      '</div><div style="display:flex;gap:8px;align-items:center;flex-shrink:0">'+
      (r.status==="Confirmed"&&s?'<a href="'+gcalUrl(s)+'" target="_blank" class="btn-sm" style="display:inline-block;background:#2E7D32;color:#fff;text-decoration:none;border-radius:8px;padding:8px 12px;font-size:12px">📅 Cal</a>':'')+
      '<button class="btn-sm btn-danger" onclick="doCancel(\''+r.id+'\')" '+(S.processing?'disabled':'')+'>Cancel</button></div></div>';
  });}
  h+='</div>';return h;
}

// === ADMIN ===
function rAdmin(){
  var h='<div class="admin-hdr"><div class="header-inner"><div class="header-left">'+
    '<button class="back-btn" onclick="S.view=\'landing\';S.isAdmin=false;render()">← Home</button><h1>Admin Portal</h1></div>'+
    '<div style="display:flex;gap:8px">';
  ["dashboard","sessions","registrations","settings"].forEach(function(t){
    h+='<button class="admin-tab'+(S.adminTab===t?' active':'')+'" onclick="S.adminTab=\''+t+'\';render()">'+t+'</button>';
  });
  h+='</div></div></div><div class="content fade-up">';
  switch(S.adminTab){
    case "dashboard":h+=rDash();break;case "sessions":h+=rAdminSess();break;
    case "registrations":h+=rAdminRegs();break;case "settings":h+=rSettings();break;
  }
  return h+'</div>';
}

function rDash(){
  var tc=S.registrations.filter(function(r){return r.status==="Confirmed"}).length;
  var tw=S.registrations.filter(function(r){return r.status==="Waitlisted"}).length;
  var ue={};S.registrations.forEach(function(r){ue[r.email]=1});var uc=Object.keys(ue).length;
  var h='<div class="stats-grid">'+
    '<div class="stat"><p class="stat-label">Total Sessions</p><p class="stat-val">'+S.sessions.length+'</p></div>'+
    '<div class="stat"><p class="stat-label">Confirmed</p><p class="stat-val" style="color:#2E7D32">'+tc+'</p></div>'+
    '<div class="stat"><p class="stat-label">Waitlisted</p><p class="stat-val" style="color:#E65100">'+tw+'</p></div>'+
    '<div class="stat"><p class="stat-label">Unique Participants</p><p class="stat-val" style="color:#0D47A1">'+uc+'</p></div></div>';
  var ents=S.settings.entities||[];var ec={};ents.forEach(function(e){ec[e]=0});
  S.registrations.forEach(function(r){if(ec[r.entity]!==undefined)ec[r.entity]++});
  var mx=Math.max.apply(null,Object.values(ec).concat([1]));
  h+='<h3 style="font-size:16px;font-weight:700;margin-bottom:12px">Registrations by Entity</h3><div class="bar-chart">';
  ents.forEach(function(e){var c=ec[e]||0,p=Math.round(c/mx*100);
    h+='<div class="bar-row"><span class="bar-lbl">'+esc(e)+'</span><div class="bar-trk"><div class="bar-fl" style="width:'+(c>0?p:0)+'%">'+(c>0?'<span>'+c+'</span>':'')+'</div></div></div>';
  });
  h+='</div><h3 style="font-size:16px;font-weight:700;margin-bottom:12px">Session Fill Rates</h3><div class="fill-list">';
  S.sessions.forEach(function(s){
    var c=confCount(s.id),w=waitCount(s.id),p=Math.min(100,Math.round(c/s.capacity*100)),co=p>=100?"#C62828":p>=80?"#E65100":"#2E7D32";
    h+='<div class="fill-row"><span class="fill-nm">'+esc(s.title)+' ('+esc(s.time)+')</span><div class="fill-bar"><div class="fill-inner" style="width:'+p+'%;background:'+co+'"></div></div>'+
      '<span class="fill-ct">'+c+'/'+s.capacity+(w>0?' (+'+w+' WL)':'')+'</span></div>';
  });
  return h+'</div>';
}

function rAdminSess(){
  var defCat=esc((S.settings.categories||["Netflix Workshop"])[0]);
  var h='<div class="sec-hdr"><h2>Manage Sessions ('+S.sessions.length+')</h2>'+
    '<button class="btn btn-pri" style="padding:10px 20px;font-size:14px" onclick="S.editSession={id:\'\',title:\'\',description:\'\',date:\'\',time:\'\',duration:90,category:\''+defCat+'\',capacity:25,externalEntityCap:5,restrictedToEntity:\'\',meetingLink:\'\',location:\'Virtual \u2014 Zoom link will be provided\'};S.isNew=true;render()">+ New Session</button></div>';
  S.sessions.forEach(function(s){
    var st=sessStatus(s),c=confCount(s.id);
    h+='<div class="sli"><div class="sli-info"><div style="display:flex;gap:10px;align-items:center">'+
      '<span class="badge '+catClass(s.category)+'">'+esc(s.category)+'</span><span class="badge b-'+st+'">'+statusLabel(st)+'</span>'+
      (s.restrictedToEntity?'<span class="entity-tag">🔒 '+esc(s.restrictedToEntity)+'</span>':'')+'</div>'+
      '<h3>'+esc(s.title)+'</h3><p>'+fmtDate(s.date)+' · '+esc(s.time)+' PT · '+s.duration+'m · '+c+'/'+s.capacity+' confirmed'+(s.externalEntityCap>0?' · Ext cap: '+s.externalEntityCap:'')+'</p></div>'+
      '<div class="sli-acts"><button class="btn-sm" style="background:#f5f5f5;border:1px solid #E0E0E0" onclick="S.editSession=JSON.parse(JSON.stringify(findSess(\''+s.id+'\')));S.isNew=false;render()">Edit</button>'+
      '<button class="btn-sm btn-danger" onclick="doDeleteSession(\''+s.id+'\')">Delete</button></div></div>';
  });
  return h;
}

function rAdminRegs(){
  var h='<div class="sec-hdr"><h2>All Registrations ('+S.registrations.length+')</h2>'+
    '<button class="btn btn-pri" style="padding:10px 20px;font-size:14px" onclick="doExport()">Export CSV ↓</button></div>';
  if(!S.registrations.length)return h+'<div class="empty"><p>No registrations yet.</p></div>';
  h+='<div class="tbl-wrap"><table><thead><tr><th>Name</th><th>Email</th><th>Entity</th><th>Manager</th><th>Session</th><th>Session Date</th><th>Status</th><th>RSVP Date</th><th></th></tr></thead><tbody>';
  S.registrations.forEach(function(r){
    var sess=S.sessions.find(function(x){return x.id===r.sessionId});
    var sessDate=sess?fmtDate(sess.date)+(sess.time?" · "+sess.time+" PT":""):"—";
    h+='<tr><td style="font-weight:600">'+esc(r.name)+'</td><td style="color:#555">'+esc(r.email)+'</td><td>'+esc(r.entity)+'</td><td style="color:#555">'+esc(r.manager)+'</td>'+
      '<td class="trunc">'+esc(r.sessionTitle)+'</td><td style="font-size:12px">'+sessDate+'</td><td><span class="badge '+(r.status==="Confirmed"?"b-conf":"b-wait")+'">'+esc(r.status)+'</span></td>'+
      '<td style="color:#888;font-size:12px">'+(r.timestamp?new Date(r.timestamp).toLocaleDateString():"")+'</td>'+
      '<td><button style="background:none;border:none;color:#C62828;font-size:12px;cursor:pointer;font-weight:600" onclick="doCancel(\''+r.id+'\')">Remove</button></td></tr>';
  });
  return h+'</tbody></table></div>';
}

function rSettings(){
  var s=S.settings;
  return '<h2 style="font-size:20px;font-weight:700;margin-bottom:24px">Portal Settings</h2><div class="settings-panel">'+
    '<div class="sg"><label>Max Sessions Per Person</label><input class="form-input" type="number" id="set-max" value="'+(s.maxSessionsPerPerson||5)+'" min="1" style="width:100px"><p class="hint">Limit how many sessions a participant can register for.</p></div>'+
    '<div class="sg"><label>Admin Access Code</label><input class="form-input" id="set-code" value="'+esc(s.adminCode||"admin2026")+'" style="width:200px"><p class="hint">Change the code required to access admin.</p></div>'+
    '<div class="sg"><label>Entities (comma-separated)</label><input class="form-input" id="set-ent" value="'+esc((s.entities||[]).join(", "))+'"><p class="hint">These appear in the entity dropdown.</p></div>'+
    '<div class="sg"><label>Categories (comma-separated)</label><input class="form-input" id="set-cat" value="'+esc((s.categories||[]).join(", "))+'"><p class="hint">Available categories when creating sessions.</p></div>'+
    '<div style="margin-top:24px;padding-top:24px;border-top:1px solid #ECECEC">'+
    '<p style="font-size:12px;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:.5px;margin-bottom:16px">Google Calendar Integration</p>'+
    '<div class="sg"><label>Shared Calendar ID</label><input class="form-input" id="set-calid" value="'+esc(s.calendarId||'')+'" placeholder="e.g. abc123@group.calendar.google.com"><p class="hint">The ID of your shared Feedback Workshops calendar. Find it in Google Calendar → Settings → Integrate calendar. Enter this once and it applies to all sessions.</p></div></div>'+
    '<button class="btn btn-pri" style="padding:12px 28px;font-size:14px" onclick="doSaveSettings()">Save Settings</button></div>';
}

function rEditModal(){
  var s=S.editSession;if(!s)return"";
  var cats=S.settings.categories||["Netflix Workshop","Animation Studio Workshop","Eyeline Workshop"];
  var ents=S.settings.entities||["Netflix","Netflix Animation Studio","Eyeline"];
  var h='<div class="overlay" onclick="if(event.target===this){S.editSession=null;S.isNew=false;render()}"><div class="modal">'+
    '<div class="modal-hdr"><h2>'+(S.isNew?'New Session':'Edit Session')+'</h2><button class="modal-close" onclick="S.editSession=null;S.isNew=false;render()">×</button></div>'+
    '<div class="fg"><input class="form-input" placeholder="Session Title *" value="'+esc(s.title)+'" oninput="S.editSession.title=this.value"></div>'+
    '<div class="fg"><textarea class="form-input form-textarea" placeholder="Description" oninput="S.editSession.description=this.value">'+esc(s.description)+'</textarea></div>'+
    '<div class="form-row"><div class="fg"><label class="form-label">Date</label><input class="form-input" type="date" value="'+esc(s.date)+'" onchange="S.editSession.date=this.value"></div>'+
    '<div class="fg"><label class="form-label">Time (PT)</label><input class="form-input" placeholder="e.g. 1:00 PM" value="'+esc(s.time)+'" oninput="S.editSession.time=this.value"></div></div>'+
    '<div class="form-row"><div class="fg"><label class="form-label">Duration (min)</label><input class="form-input" type="number" value="'+s.duration+'" oninput="S.editSession.duration=parseInt(this.value)||0"></div>'+
    '<div class="fg"><label class="form-label">Capacity</label><input class="form-input" type="number" value="'+s.capacity+'" oninput="S.editSession.capacity=parseInt(this.value)||0"></div></div>'+
    '<div class="fg"><label class="form-label">Category</label><select class="form-select" onchange="S.editSession.category=this.value">';
  cats.forEach(function(c){h+='<option value="'+esc(c)+'"'+(s.category===c?' selected':'')+'>'+esc(c)+'</option>'});
  h+='</select></div><div class="fg"><label class="form-label">External Entity Cap (0 = no external spots)</label><input class="form-input" type="number" value="'+(s.externalEntityCap||0)+'" oninput="S.editSession.externalEntityCap=parseInt(this.value)||0"></div>'+
    '<div class="fg"><label class="form-label">Restrict to Entity (leave empty for open)</label><select class="form-select" onchange="S.editSession.restrictedToEntity=this.value">'+
    '<option value=""'+(!s.restrictedToEntity?' selected':'')+'>Open to All</option>';
  ents.forEach(function(e){h+='<option value="'+esc(e)+'"'+(s.restrictedToEntity===e?' selected':'')+'>'+esc(e)+' Only</option>'});
  h+='</select></div>'+
    '<div class="fg"><label class="form-label">Meeting Link (Zoom, Google Meet, etc.)</label><input class="form-input" placeholder="https://zoom.us/j/123456789" value="'+esc(s.meetingLink||'')+'" oninput="S.editSession.meetingLink=this.value"></div>'+
    '<div class="fg"><label class="form-label">Location / Join Instructions</label><input class="form-input" placeholder="Virtual — Zoom link will be provided" value="'+esc(s.location||'')+'" oninput="S.editSession.location=this.value"></div>'+
    '<button class="btn-block" onclick="doSaveSession()" '+(S.processing?'disabled':'')+'>'+(S.processing?'Saving...':(S.isNew?'Create Session':'Save Changes'))+'</button></div></div>';
  return h;
}
</script>
